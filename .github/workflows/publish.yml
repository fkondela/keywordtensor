name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-main:
    name: Publish Main Package
    runs-on: ubuntu-latest
    environment: release-main
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build keywordtensor (Main Training Package)
        run: python -m build

      - name: Publish keywordtensor to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-edge:
    name: Publish Edge Package
    runs-on: ubuntu-latest
    environment: release-edge
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Transform to keywordtensor-edge (Lightweight Inference Package)
        run: |
          sed -i 's/name = "keywordtensor"/name = "keywordtensor-edge"/g' pyproject.toml
          sed -i 's/description = "A Python library/description = "A lightweight inference library/g' pyproject.toml
          sed -i '/"fastai"/d' pyproject.toml
          
      - name: Build keywordtensor-edge
        run: python -m build

      - name: Publish keywordtensor-edge to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
